services:
  - type: web
    name: video-claw-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: JWT_SECRET
        value: video-claw-secret-key-2026
    plans:
      - plan: free
